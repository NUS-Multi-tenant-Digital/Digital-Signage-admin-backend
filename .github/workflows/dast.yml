name: DAST

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package application
        run: mvn -B package -DskipTests

      - name: Start application (dast profile)
        run: |
          JAR=$(ls target/*.jar | grep -v 'original' | head -1)
          echo "Starting $JAR with profile dast (embedded H2)"
          java -jar "$JAR" --spring.profiles.active=dast --server.port=8080 > app.log 2>&1 &
          echo $! > app.pid
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/admin/auth/login || echo "000")
            echo "probe $i: HTTP $code"
            if [ "$code" = "405" ] || [ "$code" = "400" ] || [ "$code" = "401" ]; then
              echo "Application is up"
              exit 0
            fi
            sleep 3
          done
          echo "Application failed to start"
          tail -n 200 app.log || true
          exit 1

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://127.0.0.1:8080"
          cmd_options: "-a"

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_md.md
            report_json.json
            app.log

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" 2>/dev/null || true
          fi
