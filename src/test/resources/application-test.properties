app.api.admin-prefix=/api/admin
app.api.device-prefix=/api/device
app.websocket.device-endpoint=/ws/device
app.jwt.secret=0123456789abcdef0123456789abcdef
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=14
spring.datasource.url=jdbc:h2:mem:digital_signage_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
