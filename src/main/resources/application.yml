spring:
  application:
    name: digital-signage-admin-backend

  datasource:
    url: jdbc:mysql://localhost:3306/digital_signage?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password:

server:
  servlet:
    context-path: /
  port: 8080

# 与 docs/API_SPEC.md 一致
app:
  api:
    admin-prefix: /api/admin
    device-prefix: /api/device
  websocket:
    device-endpoint: /ws/device
  jwt:
    # HS256 至少需要 32 字节；生产环境务必通过环境变量覆盖
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}

  # 媒体直传：upload-policy 返回 objectKey；可选配置公网访问前缀与预签名 URL 模板（{objectKey} 占位）
  storage:
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
    presigned-put-url-template: ${STORAGE_PRESIGNED_PUT_URL_TEMPLATE:}
    upload-policy-expire-minutes: ${STORAGE_UPLOAD_POLICY_EXPIRE_MINUTES:60}
  device:
    presence:
      monitor-interval-ms: 30000
      ws-silence-threshold-seconds: 90
      suspect-probe-threshold: 1
      offline-probe-threshold: 3
      heartbeat-stale-seconds: 600
