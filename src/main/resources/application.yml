spring:
  application:
    name: digital-signage-admin-backend

  datasource:
    url: jdbc:mysql://localhost:3306/digital_signage?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password:

server:
  servlet:
    context-path: /
  port: 8080

# 本地可将变量写在项目根目录 .env（见 .env.example）；spring-dotenv 会加载，且系统环境变量优先
springdotenv:
  ignore-if-missing: true

# 与 docs/API_SPEC.md 一致
app:
  api:
    admin-prefix: /api/admin
    device-prefix: /api/device
  websocket:
    device-endpoint: /ws/device
  jwt:
    # HS256 至少需要 32 字节；生产环境务必通过环境变量覆盖
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}

  registration:
    # 组织注册后邮箱验证码有效期（ISO-8601 Duration，如 PT48H）
    verification-token-ttl: ${REGISTRATION_VERIFICATION_TOKEN_TTL:PT48H}

  mail:
    # enabled 默认 false；激活 profile「mail」且配置 SMTP 时可在 application-mail.yml 中设为 true。勿写 enabled: false。
    from: ${APP_MAIL_FROM:noreply@localhost}
    verification-subject: ${APP_MAIL_VERIFICATION_SUBJECT:邮箱验证码}

  # 媒体直传：upload-policy 返回 objectKey；阿里云 OSS 配齐则自动生成预签名 PUT（AK/SK 仅环境变量）；可选公网前缀与预签名 URL 模板（{objectKey} 占位）
  storage:
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
    presigned-put-url-template: ${STORAGE_PRESIGNED_PUT_URL_TEMPLATE:}
    upload-policy-expire-minutes: ${STORAGE_UPLOAD_POLICY_EXPIRE_MINUTES:60}
    oss:
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      bucket: ${ALIYUN_OSS_BUCKET:}
      region: ${ALIYUN_OSS_REGION:}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
  device:
    presence:
      monitor-interval-ms: 30000
      ws-silence-threshold-seconds: 90
      suspect-probe-threshold: 1
      offline-probe-threshold: 3
      heartbeat-stale-seconds: 600

# 真邮件：设置 SPRING_PROFILES_ACTIVE 含 mail，并提供 MAIL_*（见 application-mail.yml），或由平台注入 SPRING_MAIL_*。
